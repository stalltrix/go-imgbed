<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Image History</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f4f8;
}
.navbar{
    background:#8796a2;
    padding:12px 25px;
    display:flex;
    gap:20px;
}
.navbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
.navbar a:hover{
    text-decoration:underline;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    transition:transform .15s, box-shadow .15s;
}
.card:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
}
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    background:#eee;
}
.info{
    padding:12px;
    font-size:13px;
    word-break:break-all;
    color:#555;
}
.actions{
    display:flex;
    gap:6px;
    padding:10px;
}
button{
    flex:1;
    border:none;
    padding:6px;
    border-radius:5px;
    cursor:pointer;
    font-size:13px;
}
.copy{
    background:#4caf50;
    color:white;
}
.copy:hover{
    background:#43a047;
}
.delete{
    background:#f44336;
    color:white;
}
.delete:hover{
    background:#d32f2f;
}
.empty{
    text-align:center;
    color:#777;
    padding:40px;
}
</style>

</head>

<body>

<div class="navbar">
<a href="{{.Name}}">Upload</a>
<a href="{{.Name}}?act=history">History</a>
</div>

<div class="container">
    <div id="grid" class="grid"></div>
</div>

<script>

const API="{{.Name}}"
const grid=document.getElementById("grid")

function load(){
    fetch(API,{
        method:"POST",
        credentials:"include",
        headers:{
            "X-Type":"list"
        }
    })
    .then(r=>r.json())
    .then(data=>{
        render(data)
    })
}

function render(data){

    grid.innerHTML=""

    const files=Object.keys(data)

    if(files.length===0){
        grid.innerHTML='<div class="empty">No images uploaded</div>'
        return
    }

    files.forEach(name=>{

        const url=location.origin+"/file/"+name

        const card=document.createElement("div")
        card.className="card"

        const img=document.createElement("img")
        img.src=url

        const info=document.createElement("div")
        info.className="info"
        info.innerText=name

        const actions=document.createElement("div")
        actions.className="actions"

        const copy=document.createElement("button")
        copy.className="copy"
        copy.innerText="复制"
        copy.onclick=()=>{
            navigator.clipboard.writeText(url)
        }

        const del=document.createElement("button")
        del.className="delete"
        del.innerText="删除"
        del.onclick=()=>removeFile(name)

        actions.appendChild(copy)
        actions.appendChild(del)

        card.appendChild(img)
        card.appendChild(info)
        card.appendChild(actions)

        grid.appendChild(card)

    })
}

function removeFile(name){

    if(!confirm("删除此图片?")) return

    fetch(API,{
        method:"POST",
        credentials:"include",
        headers:{
            "X-Type":"del",
            "Content-Type":"application/json"
        },
        body:JSON.stringify({file:name})
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.ok){
            load()
        }else{
            alert(d.state)
        }
    })
}

load()
</script>
</body>
</html>
